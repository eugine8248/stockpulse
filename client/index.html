<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#faf6f0" />
    <title>stockpulse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply theme before React renders so there's no flash-of-light-mode.
      // Reads localStorage['stockpulse.theme'] (falls back to system preference,
      // then light). Sets both `data-theme` attribute and legacy `.dark` class
      // so all theme paths resolve consistently.
      (function () {
        try {
          var t = localStorage.getItem('stockpulse.theme');
          if (t !== 'dark' && t !== 'light') {
            t = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.setAttribute('data-theme', t);
          if (t === 'dark') document.documentElement.classList.add('dark');
        } catch (e) { /* private mode — ignore */ }
      })();
    </script>
  </head>
  <body class="bg-bg text-text font-sans antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
